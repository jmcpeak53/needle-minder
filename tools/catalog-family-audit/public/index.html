<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DMC Catalog Family Audit</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Needle Minder</p>
          <h1>Catalog Family Audit</h1>
          <p class="lede">
            Review DMC thread family assignments, confirm the obvious rows, and patch the
            canonical catalogs when the queue is clean.
          </p>
        </div>
        <div class="hero-actions">
          <button id="refresh-button" class="secondary">Refresh</button>
          <button id="apply-button" class="primary">Apply Reviewed Changes</button>
        </div>
      </header>

      <section class="toolbar">
        <div class="statline" id="statline"></div>
        <div class="filters">
          <label>
            <span>Catalog</span>
            <select id="catalog-filter">
              <option value="">All catalogs</option>
            </select>
          </label>
          <label>
            <span>Status</span>
            <select id="status-filter">
              <option value="">All statuses</option>
              <option value="unreviewed">Unreviewed</option>
              <option value="confirmed">Confirmed</option>
              <option value="changed">Changed</option>
              <option value="needs-research">Needs research</option>
            </select>
          </label>
          <label>
            <span>Family</span>
            <select id="family-filter">
              <option value="">All families</option>
            </select>
          </label>
          <label class="search">
            <span>Search</span>
            <input id="search-filter" type="search" placeholder="Code, name, notes" />
          </label>
          <label class="flag">
            <input id="likely-filter" type="checkbox" />
            <span>Likely wrong only</span>
          </label>
        </div>
      </section>

      <main>
        <section class="group-list" id="group-list"></section>
      </main>
    </div>

    <template id="card-template">
      <article class="card">
        <div class="swatch-row">
          <div class="swatch"></div>
          <div class="identity">
            <div class="code"></div>
            <div class="name"></div>
            <div class="meta"></div>
          </div>
        </div>
        <div class="chips"></div>
        <p class="reasons"></p>
        <div class="controls">
          <label>
            <span>Status</span>
            <select class="status-select">
              <option value="unreviewed">Unreviewed</option>
              <option value="confirmed">Confirmed</option>
              <option value="changed">Changed</option>
              <option value="needs-research">Needs research</option>
            </select>
          </label>
          <label>
            <span>Reviewed family</span>
            <input class="family-input" list="family-options" placeholder="Keep empty until reviewed" />
          </label>
          <label>
            <span>Notes</span>
            <textarea class="notes-input" rows="3" placeholder="Why this row needs attention"></textarea>
          </label>
        </div>
        <div class="quick-actions">
          <button class="secondary confirm-button">Keep Current</button>
          <button class="secondary research-button">Needs Research</button>
        </div>
      </article>
    </template>

    <datalist id="family-options"></datalist>
    <script type="module" src="/app.js"></script>
  </body>
</html>
